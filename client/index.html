<!DOCTYPE html>

<html lang="en">

<head>

  <!-- =========================
       META
  ========================== -->

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content=
    "width=device-width, initial-scale=1.0"
  />

  <!-- =========================
       TITLE
  ========================== -->

  <title>
    Vertex AI Cloud
  </title>

  <!-- =========================
       CSS
  ========================== -->

  <link
    rel="stylesheet"
    href="./styles/main.css"
  />

  <link
    rel="stylesheet"
    href="./styles/dashboard.css"
  />

  <link
    rel="stylesheet"
    href="./styles/auth.css"
  />

  <link
    rel="stylesheet"
    href="./styles/workspace.css"
  />

  <link
    rel="stylesheet"
    href="./styles/billing.css"
  />

  <link
    rel="stylesheet"
    href="./styles/deployments.css"
  />

  <link
    rel="stylesheet"
    href="./styles/settings.css"
  />

</head>

<body>

  <!-- =========================
       APP
  ========================== -->

  <div class="app">

    <!-- =========================
         SIDEBAR
    ========================== -->

    <aside
      class="sidebar"
      id="sidebar"
    >

      <!-- =========================
           TOP
      ========================== -->

      <div>

        <!-- =========================
             LOGO
        ========================== -->

        <div
          class="sidebar-logo"
        >

          <div
            class="logo-icon"
          >
            V
          </div>

          <div
            class="logo-text"
          >

            <h2>
              Vertex AI
            </h2>

            <p>
              Enterprise OS
            </p>

          </div>

        </div>

        <!-- =========================
             MENU
        ========================== -->

        <div
          class="sidebar-menu"
        >

          <button
            class=
            "menu-item active"

            data-page=
            "dashboard"
          >

            <span
              class="menu-icon"
            >
              🏠
            </span>

            <span>
              Dashboard
            </span>

          </button>

          <button
            class="menu-item"

            data-page=
            "workspace"
          >

            <span
              class="menu-icon"
            >
              🤖
            </span>

            <span>
              AI Workspace
            </span>

          </button>

          <button
            class="menu-item"

            data-page=
            "deployments"
          >

            <span
              class="menu-icon"
            >
              🚀
            </span>

            <span>
              Deployments
            </span>

          </button>

          <button
            class="menu-item"

            data-page=
            "billing"
          >

            <span
              class="menu-icon"
            >
              💳
            </span>

            <span>
              Billing
            </span>

          </button>

          <button
            class="menu-item"

            data-page=
            "settings"
          >

            <span
              class="menu-icon"
            >
              ⚙️
            </span>

            <span>
              Settings
            </span>

          </button>

        </div>

      </div>

      <!-- =========================
           FOOTER
      ========================== -->

      <div
        class="sidebar-footer"
      >

        <div
          class="upgrade-card"
        >

          <h3>
            Upgrade Pro
          </h3>

          <p>

            Unlock AI agents,
            enterprise deployment,
            automation,
            premium cloud,
            and advanced scaling.

          </p>

          <button
            class=
            "upgrade-btn"
          >

            Upgrade Now

          </button>

        </div>

      </div>

    </aside>

    <!-- =========================
         MAIN
    ========================== -->

    <div
      class="main-layout"
    >

      <!-- =========================
           TOPBAR
      ========================== -->

      <header
        class="topbar"
      >

        <!-- SEARCH -->

        <div
          class=
          "topbar-search"
        >

          <input
            type="text"

            placeholder=
            "Search projects, deployments, AI agents..."
          />

        </div>

        <!-- RIGHT -->

        <div
          class=
          "topbar-right"
        >

          <button
            class="icon-btn"
          >
            🔔
          </button>

          <button
            class="icon-btn"
          >
            ⚡
          </button>

          <!-- USER -->

          <div
            class="user-card"
          >

            <div
              class=
              "user-avatar"

              id=
              "userAvatar"
            >
              U
            </div>

            <div
              class=
              "user-info"
            >

              <h3
                id=
                "topbarUserName"
              >
                Guest User
              </h3>

              <p>
                Free Plan
              </p>

            </div>

          </div>

        </div>

      </header>

      <!-- =========================
           MAIN CONTENT
      ========================== -->

      <main
        class=
        "main-content"

        id=
        "mainContent"
      >

      </main>

    </div>

  </div>

  <!-- =========================
       SCRIPT
  ========================== -->

  <script
    type="module"
    src="./app.js"
  ></script>

</body>

</html>
