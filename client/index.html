<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>

    VertexCloud AI

  </title>

  <!-- GOOGLE FONT -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="styles.css"
  />

</head>

<body>

  <!-- =========================
       APP
  ========================== -->

  <div class="app">

    <!-- =========================
         SIDEBAR
    ========================== -->

    <aside class="sidebar">

      <!-- LOGO -->

      <div class="logo">

        ⚡ VertexCloud

      </div>

      <!-- MENU -->

      <div class="menu">

        <div
          class="menu-item active"
          data-page="dashboard"
        >
          💬 Dashboard
        </div>

        <div
          class="menu-item"
          data-page="deployments"
        >
          🚀 Deployments
        </div>

        <div
          class="menu-item"
          data-page="billing"
        >
          💳 Billing
        </div>

        <div
          class="menu-item"
          data-page="settings"
        >
          ⚙ Settings
        </div>

        <div
          class="menu-item"
          data-page="login"
        >
          🔐 Login
        </div>

        <div
          class="menu-item"
          data-page="register"
        >
          👤 Register
        </div>

      </div>

    </aside>

    <!-- =========================
         MAIN
    ========================== -->

    <main class="main">

      <!-- NAVBAR -->

      <div id="navbarContainer"></div>

      <!-- DYNAMIC CONTENT -->

      <div id="mainContent"></div>

    </main>

  </div>

  <!-- =========================
       JAVASCRIPT
  ========================== -->

  <script
    type="module"
    src="app.js"
  ></script>

</body>
</html>
